<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burst-to-Queue Ledger</title>
  <style>
    /* ── Custom Properties ─────────────────────────────────── */
    :root {
      --bg-dark: #0a0e27;
      --bg-section: #0f1538;
      --blue: #3b82f6;
      --blue-glow: #60a5fa;
      --amber: #f59e0b;
      --amber-glow: #fbbf24;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
    }

    /* ── CSS Reset ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Base ───────────────────────────────────────────────── */
    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
    }

    /* ── Responsive Font Sizing ────────────────────────────── */
    h1 { font-size: clamp(2rem, 5vw, 4rem); }
    h2 { font-size: clamp(1.5rem, 3.5vw, 2.75rem); }
    h3 { font-size: clamp(1.25rem, 2.5vw, 2rem); }
    p  { font-size: clamp(1rem, 1.5vw, 1.25rem); }

    /* ── Section Layout ────────────────────────────────────── */
    .section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 5vw, 6rem) clamp(1rem, 4vw, 4rem);
    }

    /* ── Alternating Backgrounds ───────────────────────────── */
    #hero        { background: var(--bg-dark); }
    #problem     { background: var(--bg-section); }
    #architecture { background: var(--bg-dark); }
    #results     { background: var(--bg-section); }
    #footer      { background: var(--bg-dark); }
  </style>
</head>
<body>

  <section id="hero" class="section"></section>

  <section id="problem" class="section"></section>

  <section id="architecture" class="section"></section>

  <section id="results" class="section"></section>

  <section id="footer" class="section"></section>

</body>
</html>
